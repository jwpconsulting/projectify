- name: Configure SSH Bastion
  hosts: ssh_bastion
  roles:
    - system
    - ssh_bastion

- name: Configure Projectify App Server
  hosts: projectify_app
  roles:
    - system
    - projectify_app
  vars:
    static_root: /usr/share/projectify/static
    media_root: /var/lib/projectify/state/media
    # Expect volume mounted at /srv/backups
    media_backup_dest: /srv/backups/projectify_app_media
    pgbackrest_dest: /srv/backups/pgbackrest
    credentials_file: /var/lib/projectify/credentials.toml
    venv_path: /var/lib/projectify/venv
