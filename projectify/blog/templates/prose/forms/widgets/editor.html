<div class="django-prose-editor-container">
    <input id="{{ widget.attrs.id }}"
           name="{{ widget.name }}"
           type="hidden"
           {% if widget.value %}value="{{ widget.value }}"{% endif %} />
    <trix-editor input="{{ widget.attrs.id }}" class="django-prose-editor trix-content prose
    {% if widget.attrs.class %}{{ widget.attrs.class }}{% endif %}
    " data-heading-blocks="{{ widget.heading_blocks }}"
    {% if widget.upload_url %}data-upload-attachment-url="{{ widget.upload_url }}"{% endif %}
    ></trix-editor>
</div>
