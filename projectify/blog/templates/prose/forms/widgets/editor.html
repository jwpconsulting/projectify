<div class="django-prose-editor-container">
    <input id="{{ widget.attrs.id }}"
           name="{{ widget.name }}"
           type="hidden"
           name="content"
           {% if widget.value %}value="{{ widget.value }}"{% endif %} />
    <trix-editor input="{{ widget.attrs.id }}" class="django-prose-editor trix-content" data-upload-attachment-url="{% url 'blog:upload_attachment' %}"></trix-editor>
</div>
