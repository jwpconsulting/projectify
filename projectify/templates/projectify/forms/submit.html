<button type="submit"
        class="{% if not small %}w-full{% endif %} bg-primary text-primary-content hover:bg-primary-hover active:bg-primary-pressed text-base min-w-max rounded-lg px-4 py-2 font-bold disabled:bg-disabled disabled:text-disabled-primary-content"
        {% if name %}name="{{ name }}"{% endif %}
        {% if value %}value="{{ value }}"{% endif %}
        {% if form_name %}form="{{ form_name }}"{% endif %}>{{ text }}</button>
