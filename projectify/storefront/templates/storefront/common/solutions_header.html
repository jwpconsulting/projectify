{% load i18n %}
{% load projectify %}
<div class="flex w-full flex-col items-center bg-background">
    <header class="flex w-full max-w-4xl px-6 py-6 sm:py-12 flex-col items-center gap-4 justify-center sm:grid sm:grid-cols-2">
        <div class="flex flex-col gap-8 text-center font-bold sm:text-left">
            <h1 class="text-4xl lg:text-6xl">{% trans title %}</h1>
            <p class="max-w-md text-xl">{% trans text %}</p>
        </div>
        <div class="w-full max-w-xs justify-self-center">{% picture src=src alt=alt %}</div>
    </header>
</div>
